name: Publish Package to GitHub Packages
on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '18.x'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@gorakudo'
      - run: npm ci
      - run: npm pkg set name="@gorakudo/yomitan-mcp-server"
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
